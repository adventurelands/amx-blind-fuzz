<svg xmlns="http://www.w3.org/2000/svg" width="760" height="190" viewBox="0 0 760 190" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif">
  <rect width="760" height="190" fill="#0d1117"/>
  <text x="30" y="38" fill="#e6edf3" font-size="20" font-weight="600">blind operand-space fuzzing</text>
  <text x="30" y="60" fill="#8b949e" font-size="13">recover an undocumented instruction set from a cold start</text>
  <g>
    <!-- box 0 -->
    <rect x="30"  y="95" width="150" height="62" rx="10" fill="#161b22" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="105" y="122" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">emit</text>
    <text x="105" y="142" text-anchor="middle" fill="#8b949e" font-size="12">operand word</text>
    <!-- box 1 -->
    <rect x="210" y="95" width="150" height="62" rx="10" fill="#161b22" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="285" y="122" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">trap-recover</text>
    <text x="285" y="142" text-anchor="middle" fill="#8b949e" font-size="12">survive SIGILL</text>
    <!-- box 2 -->
    <rect x="390" y="95" width="150" height="62" rx="10" fill="#161b22" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="465" y="122" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">fingerprint</text>
    <text x="465" y="142" text-anchor="middle" fill="#8b949e" font-size="12">output state</text>
    <!-- box 3 -->
    <rect x="570" y="95" width="160" height="62" rx="10" fill="#161b22" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="650" y="122" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600">minimize</text>
    <text x="650" y="142" text-anchor="middle" fill="#8b949e" font-size="12">operand bits</text>
  </g>
  <g stroke="#2dd4bf" stroke-width="2" fill="none">
    <path d="M180 126 L205 126" marker-end="url(#a)"/>
    <path d="M360 126 L385 126" marker-end="url(#a)"/>
    <path d="M540 126 L565 126" marker-end="url(#a)"/>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#2dd4bf"/>
    </marker>
  </defs>
</svg>
